<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance Analytics Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            line-height: 1.6;
            padding: 40px 20px;
            color: #1a1a2e;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
            color: white;
            animation: fadeInDown 0.8s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 12px;
            letter-spacing: -0.02em;
            text-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.95;
            font-weight: 400;
            max-width: 600px;
            margin: 0 auto;
        }

        .logo-container {
            margin-bottom: 24px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .logo {
            width: 100px;
            height: 100px;
            filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.3));
        }

        .main-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9) 0%, rgba(240, 249, 255, 0.85) 100%);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            animation: fadeInUp 0.8s ease-out backwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .main-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.2);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(255, 240, 245, 0.9) 100%);
        }

        .form-section {
            background: linear-gradient(135deg, rgba(240, 249, 255, 0.6) 0%, rgba(255, 240, 245, 0.4) 100%);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 25px;
            border: 1px solid rgba(231, 60, 126, 0.15);
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .form-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(35, 166, 213, 0.1), transparent);
            transition: left 0.5s;
        }

        .form-section:hover::before {
            left: 100%;
        }

        .form-section:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 40px rgba(35, 166, 213, 0.2);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.7) 0%, rgba(240, 249, 255, 0.6) 100%);
        }

        .form-section h2 {
            color: #1a1a2e;
            margin-bottom: 24px;
            font-size: 1.3rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-section h2 svg {
            width: 24px;
            height: 24px;
        }

        .input-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .form-group {
            margin-bottom: 0;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #4a5568;
            font-weight: 500;
            font-size: 0.875rem;
            letter-spacing: -0.005em;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid rgba(231, 60, 126, 0.2);
            border-radius: 12px;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9) 0%, rgba(240, 249, 255, 0.8) 100%);
            color: #1a1a2e;
            backdrop-filter: blur(5px);
        }

        .form-group input::placeholder {
            color: #a0aec0;
        }

        .form-group input:focus {
            outline: none;
            border-color: #e73c7e;
            box-shadow: 0 0 0 4px rgba(231, 60, 126, 0.15), 0 0 20px rgba(231, 60, 126, 0.2);
            transform: translateY(-2px) scale(1.01);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(255, 240, 245, 0.9) 100%);
        }

        .form-group input:hover {
            border-color: #23a6d5;
            box-shadow: 0 4px 15px rgba(35, 166, 213, 0.15);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(240, 249, 255, 0.9) 100%);
        }

        .form-actions {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-top: 40px;
            padding-top: 32px;
            border-top: 1px solid #e2e8f0;
        }

        .btn {
            padding: 16px 32px;
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: -0.005em;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #e73c7e 0%, #23a6d5 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(231, 60, 126, 0.4);
            position: relative;
            overflow: hidden;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 10px 30px rgba(231, 60, 126, 0.5), 0 0 20px rgba(231, 60, 126, 0.3);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #6c757d 0%, #23a6d5 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(108, 117, 125, 0.3);
        }

        .btn-secondary:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 10px 30px rgba(108, 117, 125, 0.4);
        }

        .btn-sample {
            background: linear-gradient(135deg, #f093fb 0%, #ee7752 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(240, 147, 251, 0.3);
            position: relative;
            overflow: hidden;
        }

        .btn-sample::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        .btn-sample:hover::before {
            left: 100%;
        }

        .btn-sample:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 10px 30px rgba(238, 119, 82, 0.5), 0 0 20px rgba(238, 119, 82, 0.3);
        }

        .result-section {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9) 0%, rgba(240, 249, 255, 0.85) 100%);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 48px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            text-align: center;
            display: none;
            animation: fadeInUp 0.6s ease-out;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(231, 60, 126, 0.2);
        }

        .result-section.show {
            display: block;
        }

        .result-section:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.2);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(255, 240, 245, 0.9) 100%);
        }

        .result-section h2 {
            color: #1a1a2e;
            margin-bottom: 28px;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        .prediction-result {
            padding: 24px;
            border-radius: 16px;
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 20px;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .prediction-result.high {
            background: linear-gradient(135deg, rgba(35, 213, 171, 0.9) 0%, rgba(35, 213, 171, 0.7) 100%);
            color: #0d5132;
            border: 2px solid rgba(35, 213, 171, 0.8);
        }

        .prediction-result.medium {
            background: linear-gradient(135deg, rgba(240, 147, 251, 0.9) 0%, rgba(240, 147, 251, 0.7) 100%);
            color: #7c3aed;
            border: 2px solid rgba(240, 147, 251, 0.8);
        }

        .prediction-result.low {
            background: linear-gradient(135deg, rgba(231, 60, 126, 0.9) 0%, rgba(231, 60, 126, 0.7) 100%);
            color: #e53e3e;
            border: 2px solid rgba(231, 60, 126, 0.8);
            position: relative;
            overflow: hidden;
        }

        .prediction-result.low::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, 
                transparent 30%, 
                rgba(255, 255, 255, 0.1) 50%, 
                transparent 70%);
            animation: shine 3s infinite;
            pointer-events: none;
        }

        @keyframes shine {
            0% {
                transform: translateX(-100%) translateY(-100%) rotate(45deg);
            }
            100% {
                transform: translateX(100%) translateY(100%) rotate(45deg);
            }
        }

        .prediction-result::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        .prediction-result:hover::before {
            left: 100%;
        }

        .prediction-result:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 40px rgba(35, 166, 213, 0.3);
        }

        .confidence-score {
            font-size: 1.1rem;
            color: #4a5568;
            margin-top: 16px;
            font-weight: 500;
        }

        .feature-breakdown {
            margin-top: 32px;
            padding: 28px;
            background: linear-gradient(135deg, rgba(240, 249, 255, 0.6) 0%, rgba(255, 240, 245, 0.4) 100%);
            border-radius: 16px;
            border: 1px solid rgba(231, 60, 126, 0.15);
            text-align: left;
            backdrop-filter: blur(10px);
        }

        .feature-breakdown h3 {
            color: #1a1a2e;
            margin-bottom: 20px;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
        }

        .feature-item {
            padding: 16px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.8) 0%, rgba(240, 249, 255, 0.6) 100%);
            border-radius: 12px;
            border: 1px solid rgba(231, 60, 126, 0.15);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(5px);
        }

        .feature-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(35, 166, 213, 0.15), transparent);
            transition: left 0.5s;
        }

        .feature-item:hover::before {
            left: 100%;
        }

        .feature-item:hover {
            border-color: #23a6d5;
            box-shadow: 0 8px 25px rgba(35, 166, 213, 0.25);
            transform: translateY(-3px) scale(1.02);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(240, 249, 255, 0.85) 100%);
        }

        .feature-label {
            color: #718096;
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .feature-value {
            color: #1a1a2e;
            font-size: 0.9rem;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2rem;
            }

            .main-card {
                padding: 25px;
            }

            .form-section {
                padding: 20px;
            }

            .input-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .form-actions {
                flex-direction: column;
                gap: 12px;
            }

            .btn {
                width: 100%;
                padding: 14px 24px;
            }

            .result-section {
                padding: 30px;
            }

            .feature-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-container">
                <svg class="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
                    <defs>
                        <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#23d5ab;stop-opacity:1" />
                            <stop offset="50%" style="stop-color:#e73c7e;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#23a6d5;stop-opacity:1" />
                        </linearGradient>
                    </defs>
                    
                    <!-- Simple book icon -->
                    <rect x="25" y="30" width="50" height="40" rx="5" fill="url(#logoGradient)" stroke="white" stroke-width="2"/>
                    <line x1="50" y1="30" x2="50" y2="70" stroke="white" stroke-width="2"/>
                    
                    <!-- Chart/graph arrow pointing up (prediction/growth) -->
                    <polyline points="30,60 40,50 50,55 70,25" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                    <polygon points="70,25 65,30 68,35" fill="white"/>
                    
                    <!-- Simple student silhouette -->
                    <circle cx="50" cy="20" r="8" fill="url(#logoGradient)" stroke="white" stroke-width="2"/>
                    <path d="M35,85 Q50,75 65,85" fill="url(#logoGradient)" stroke="white" stroke-width="2"/>
                </svg>
            </div>
            <h1>Student Performance Analytics Platform</h1>
            <p>Comprehensive analysis and prediction of student academic performance based on gadget usage patterns</p>
        </header>

        <main>
                <form id="predictionForm" class="main-card">
                <div class="form-section">
                    <h2>
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                        </svg>
                        Educational Usage
                    </h2>
                    <div class="input-grid">
                        <div class="form-group">
                            <label for="youtube_learning">YouTube Learning</label>
                            <input type="number" id="youtube_learning" name="youtube_learning" 
                                   min="0" max="5" step="0.1" required placeholder="0-5 hours">
                        </div>
                        <div class="form-group">
                            <label for="coursera">Coursera</label>
                            <input type="number" id="coursera" name="coursera" 
                                   min="0" max="5" step="0.1" required placeholder="0-5 hours">
                        </div>
                        <div class="form-group">
                            <label for="udemy">Udemy</label>
                            <input type="number" id="udemy" name="udemy" 
                                   min="0" max="5" step="0.1" required placeholder="0-5 hours">
                        </div>
                        <div class="form-group">
                            <label for="google_classroom">Google Classroom</label>
                            <input type="number" id="google_classroom" name="google_classroom" 
                                   min="0" max="5" step="0.1" required placeholder="0-5 hours">
                        </div>
                        <div class="form-group">
                            <label for="khan_academy">Khan Academy</label>
                            <input type="number" id="khan_academy" name="khan_academy" 
                                   min="0" max="5" step="0.1" required placeholder="0-5 hours">
                        </div>
                        <div class="form-group">
                            <label for="byjus">Byjus</label>
                            <input type="number" id="byjus" name="byjus" 
                                   min="0" max="5" step="0.1" required placeholder="0-5 hours">
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h2>
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7m0 14a7 7 0 0114 0m-7 7h18" />
                        </svg>
                        Gaming & Entertainment
                    </h2>
                    <div class="input-grid">
                        <div class="form-group">
                            <label for="game_hours">Gaming Hours</label>
                            <input type="number" id="game_hours" name="game_hours" 
                                   min="0" max="8" step="0.1" required placeholder="0-8 hours">
                        </div>
                        <div class="form-group">
                            <label for="educational_games">Educational Games</label>
                            <input type="number" id="educational_games" name="educational_games" 
                                   min="0" max="5" step="0.1" required placeholder="0-5 hours">
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h2>
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h4.01M16 8c0-.6.5 0-1.5h-4.01M16 12c0 .6.5 0 1.5h-4.01" />
                        </svg>
                        Social Media Usage
                    </h2>
                    <div class="input-grid">
                        <div class="form-group">
                            <label for="instagram">Instagram</label>
                            <input type="number" id="instagram" name="instagram" 
                                   min="0" max="5" step="0.1" required placeholder="0-5 hours">
                        </div>
                        <div class="form-group">
                            <label for="snapchat">Snapchat</label>
                            <input type="number" id="snapchat" name="snapchat" 
                                   min="0" max="5" step="0.1" required placeholder="0-5 hours">
                        </div>
                        <div class="form-group">
                            <label for="whatsapp">WhatsApp</label>
                            <input type="number" id="whatsapp" name="whatsapp" 
                                   min="0" max="5" step="0.1" required placeholder="0-5 hours">
                        </div>
                        <div class="form-group">
                            <label for="youtube_social">YouTube (Social)</label>
                            <input type="number" id="youtube_social" name="youtube_social" 
                                   min="0" max="5" step="0.1" required placeholder="0-5 hours">
                        </div>
                        <div class="form-group">
                            <label for="telegram">Telegram</label>
                            <input type="number" id="telegram" name="telegram" 
                                   min="0" max="5" step="0.1" required placeholder="0-5 hours">
                        </div>
                        <div class="form-group">
                            <label for="twitter">Twitter</label>
                            <input type="number" id="twitter" name="twitter" 
                                   min="0" max="5" step="0.1" required placeholder="0-5 hours">
                        </div>
                        <div class="form-group">
                            <label for="facebook">Facebook</label>
                            <input type="number" id="facebook" name="facebook" 
                                   min="0" max="5" step="0.1" required placeholder="0-5 hours">
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h2>
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v2a3 3 0 01-3-3h-4a3 3 0 01-3-3v-2h5a4 4 0 004 4z" />
                        </svg>
                        Daily Activity
                    </h2>
                    <div class="input-grid">
                        <div class="form-group">
                            <label for="social_interactions">Social Interactions per Day</label>
                            <input type="number" id="social_interactions" name="social_interactions" 
                                   min="0" max="50" step="1" required placeholder="0-50 interactions">
                        </div>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" id="sampleBtn" class="btn btn-sample">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                        </svg>
                        Load Sample Data
                    </button>
                    <button type="submit" id="predictBtn" class="btn btn-primary">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" />
                        </svg>
                        Predict Performance
                    </button>
                    <button type="button" id="resetBtn" class="btn btn-secondary">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                        </svg>
                        Reset Form
                    </button>
                </div>
            </form>

            <div id="resultSection" class="result-section">
                <h2>Prediction Result</h2>
                <div id="predictionResult" class="prediction-result">
                    <!-- Result will be displayed here -->
                </div>
                <div id="confidenceScore" class="confidence-score">
                    <!-- Confidence score will be displayed here -->
                </div>
                <div class="feature-breakdown">
                    <h3>Feature Breakdown</h3>
                    <div id="featureBreakdown" class="feature-grid">
                        <!-- Feature breakdown will be displayed here -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Student Performance Predictor - Self-contained version
        class StudentPerformancePredictor {
            constructor() {
                this.form = document.getElementById('predictionForm');
                this.predictBtn = document.getElementById('predictBtn');
                this.resetBtn = document.getElementById('resetBtn');
                this.sampleBtn = document.getElementById('sampleBtn');
                this.resultSection = document.getElementById('resultSection');
                this.predictionResult = document.getElementById('predictionResult');
                this.confidenceScore = document.getElementById('confidenceScore');
                this.featureBreakdown = document.getElementById('featureBreakdown');
                
                this.initializeEventListeners();
            }
            
            initializeEventListeners() {
                this.form.addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.handlePrediction();
                });
                
                this.resetBtn.addEventListener('click', () => {
                    this.resetForm();
                });
                
                this.sampleBtn.addEventListener('click', () => {
                    this.loadSampleData();
                });
            }
            
            collectFormData() {
                const data = {};
                const inputs = this.form.querySelectorAll('input[type="number"]');
                
                inputs.forEach(input => {
                    data[input.name] = parseFloat(input.value) || 0;
                });
                
                return data;
            }
            
            async calculatePrediction(data) {
                try {
                    // Try local API first
                    const response = await fetch('http://localhost:5000/predict', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(data)
                    });
                    
                    if (!response.ok) {
                        throw new Error('API request failed');
                    }
                    
                    const result = await response.json();
                    return result;
                } catch (error) {
                    // Fallback to local calculation if API fails
                    console.log('API failed, using local calculation');
                    
                    // Calculate derived features
                    const educationHours = 
                        data.youtube_learning + data.coursera + data.udemy + 
                        data.google_classroom + data.khan_academy + data.byjus;
                    
                    const gamingHours = data.game_hours + data.educational_games;
                    
                    const socialMediaHours = 
                        data.instagram + data.snapchat + data.whatsapp + 
                        data.youtube_social + data.telegram + data.twitter + data.facebook;
                    
                    const dailyUsageHours = educationHours + gamingHours + socialMediaHours;
                    const socialInteractions = data.social_interactions;
                    
                    // Calculate score (matching notebook logic)
                    const score = (
                        educationHours * 0.6
                        - gamingHours * 0.2
                        - socialMediaHours * 0.2
                        - dailyUsageHours * 0.1
                        + socialInteractions * 0.1
                    );
                    
                    // Determine prediction
                    let prediction, confidence;
                    if (score >= 1.5) {
                        prediction = 'High';
                        confidence = Math.min(0.95, 0.7 + (score - 1.5) * 0.1);
                    } else if (score >= 0.5) {
                        prediction = 'Medium';
                        confidence = 0.6 + (score - 0.5) * 0.2;
                    } else {
                        prediction = 'Low';
                        confidence = Math.max(0.5, 0.8 - Math.abs(score) * 0.1);
                    }
                    
                    // Generate probabilities
                    let probabilities;
                    if (prediction === 'High') {
                        probabilities = {
                            'High': confidence,
                            'Medium': (1 - confidence) * 0.6,
                            'Low': (1 - confidence) * 0.4
                        };
                    } else if (prediction === 'Medium') {
                        probabilities = {
                            'High': (1 - confidence) * 0.3,
                            'Medium': confidence,
                            'Low': (1 - confidence) * 0.7
                        };
                    } else {
                        probabilities = {
                            'High': (1 - confidence) * 0.2,
                            'Medium': (1 - confidence) * 0.3,
                            'Low': confidence
                        };
                    }
                    
                    return {
                        prediction,
                        confidence,
                        probabilities,
                        score,
                        features: {
                            educationHours,
                            gamingHours,
                            socialMediaHours,
                            dailyUsageHours,
                            socialInteractions
                        }
                    };
                }
            }
            
            handlePrediction() {
                try {
                    const data = this.collectFormData();
                    
                    // Validate data
                    if (!this.validateData(data)) {
                        alert('Please fill in all fields with valid values');
                        return;
                    }
                    
                    // Calculate prediction
                    const result = this.calculatePrediction(data);
                    this.displayResult(result);
                    
                } catch (error) {
                    alert('Error: ' + error.message);
                }
            }
            
            validateData(data) {
                const requiredFields = [
                    'youtube_learning', 'coursera', 'udemy', 'google_classroom',
                    'khan_academy', 'byjus', 'game_hours', 'educational_games',
                    'instagram', 'snapchat', 'whatsapp', 'youtube_social',
                    'telegram', 'twitter', 'facebook', 'social_interactions'
                ];
                
                for (let field of requiredFields) {
                    if (isNaN(data[field]) || data[field] < 0) {
                        return false;
                    }
                }
                
                return true;
            }
            
            displayResult(result) {
                const { prediction, confidence, score, features } = result;
                
                // Set prediction result with appropriate styling
                this.predictionResult.textContent = `Prediction: ${prediction}`;
                this.predictionResult.className = `prediction-result ${prediction.toLowerCase()}`;
                
                // Display confidence score
                this.confidenceScore.textContent = `Confidence: ${(confidence * 100).toFixed(1)}% | Score: ${score.toFixed(2)}`;
                
                // Display feature breakdown
                this.featureBreakdown.innerHTML = `
                    <div class="feature-item">
                        <div class="feature-label">Education Hours</div>
                        <div class="feature-value">${features.educationHours.toFixed(1)}h</div>
                    </div>
                    <div class="feature-item">
                        <div class="feature-label">Gaming Hours</div>
                        <div class="feature-value">${features.gamingHours.toFixed(1)}h</div>
                    </div>
                    <div class="feature-item">
                        <div class="feature-label">Social Media Hours</div>
                        <div class="feature-value">${features.socialMediaHours.toFixed(1)}h</div>
                    </div>
                    <div class="feature-item">
                        <div class="feature-label">Daily Usage</div>
                        <div class="feature-value">${features.dailyUsageHours.toFixed(1)}h</div>
                    </div>
                    <div class="feature-item">
                        <div class="feature-label">Social Interactions</div>
                        <div class="feature-value">${features.socialInteractions}</div>
                    </div>
                `;
                
                // Show result section
                this.resultSection.classList.add('show');
                
                // Scroll to result
                setTimeout(() => {
                    this.resultSection.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 100);
            }
            
            resetForm() {
                this.form.reset();
                this.resultSection.classList.remove('show');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
            
            loadSampleData() {
                const sampleProfiles = [
                    {
                        name: 'High Performer',
                        data: {
                            youtube_learning: 3.5,
                            coursera: 2.0,
                            udemy: 1.5,
                            google_classroom: 2.0,
                            khan_academy: 1.5,
                            byjus: 0.5,
                            game_hours: 1.0,
                            educational_games: 0.5,
                            instagram: 1.2,
                            snapchat: 0.8,
                            whatsapp: 1.0,
                            youtube_social: 1.5,
                            telegram: 0.3,
                            twitter: 0.5,
                            facebook: 0.4,
                            social_interactions: 5
                        }
                    },
                    {
                        name: 'Low Performer',
                        data: {
                            youtube_learning: 0.2,
                            coursera: 0.1,
                            udemy: 0.0,
                            google_classroom: 0.1,
                            khan_academy: 0.0,
                            byjus: 0.0,
                            game_hours: 3.0,
                            educational_games: 0.2,
                            instagram: 2.5,
                            snapchat: 1.8,
                            whatsapp: 2.0,
                            youtube_social: 2.8,
                            telegram: 0.8,
                            twitter: 1.2,
                            facebook: 1.0,
                            social_interactions: 2
                        }
                    }
                ];
                
                const profile = sampleProfiles[Math.floor(Math.random() * sampleProfiles.length)];
                
                Object.entries(profile.data).forEach(([key, value]) => {
                    const input = document.getElementById(key);
                    if (input) {
                        input.value = value;
                    }
                });
                
                alert(`Loaded sample data for: ${profile.name}`);
            }
        }

        // Initialize predictor when page loads
        document.addEventListener('DOMContentLoaded', function() {
            const predictor = new StudentPerformancePredictor();
        });
    </script>
</body>
</html>
