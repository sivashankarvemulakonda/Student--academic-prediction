<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance Predictor</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Student Performance Predictor</h1>
            <p>Predict academic performance based on gadget usage patterns</p>
        </header>

        <main>
            <form id="predictionForm" class="prediction-form">
                <div class="form-section">
                    <h2>📚 Educational Usage</h2>
                    <div class="form-group">
                        <label for="youtube_learning">YouTube Learning Hours:</label>
                        <input type="number" id="youtube_learning" name="youtube_learning" 
                               min="0" max="5" step="0.1" required>
                    </div>
                    <div class="form-group">
                        <label for="coursera">Coursera Hours:</label>
                        <input type="number" id="coursera" name="coursera" 
                               min="0" max="5" step="0.1" required>
                    </div>
                    <div class="form-group">
                        <label for="udemy">Udemy Hours:</label>
                        <input type="number" id="udemy" name="udemy" 
                               min="0" max="5" step="0.1" required>
                    </div>
                    <div class="form-group">
                        <label for="google_classroom">Google Classroom Hours:</label>
                        <input type="number" id="google_classroom" name="google_classroom" 
                               min="0" max="5" step="0.1" required>
                    </div>
                    <div class="form-group">
                        <label for="khan_academy">Khan Academy Hours:</label>
                        <input type="number" id="khan_academy" name="khan_academy" 
                               min="0" max="5" step="0.1" required>
                    </div>
                    <div class="form-group">
                        <label for="byjus">Byjus Hours:</label>
                        <input type="number" id="byjus" name="byjus" 
                               min="0" max="5" step="0.1" required>
                    </div>
                </div>

                <div class="form-section">
                    <h2>🎮 Gaming & Entertainment</h2>
                    <div class="form-group">
                        <label for="game_hours">Game Hours:</label>
                        <input type="number" id="game_hours" name="game_hours" 
                               min="0" max="5" step="0.1" required>
                    </div>
                    <div class="form-group">
                        <label for="educational_games">Educational Game Hours:</label>
                        <input type="number" id="educational_games" name="educational_games" 
                               min="0" max="5" step="0.1" required>
                    </div>
                </div>

                <div class="form-section">
                    <h2>📱 Social Media Usage</h2>
                    <div class="form-group">
                        <label for="instagram">Instagram Hours:</label>
                        <input type="number" id="instagram" name="instagram" 
                               min="0" max="5" step="0.1" required>
                    </div>
                    <div class="form-group">
                        <label for="snapchat">Snapchat Hours:</label>
                        <input type="number" id="snapchat" name="snapchat" 
                               min="0" max="5" step="0.1" required>
                    </div>
                    <div class="form-group">
                        <label for="whatsapp">WhatsApp Hours:</label>
                        <input type="number" id="whatsapp" name="whatsapp" 
                               min="0" max="5" step="0.1" required>
                    </div>
                    <div class="form-group">
                        <label for="youtube_social">YouTube Social Hours:</label>
                        <input type="number" id="youtube_social" name="youtube_social" 
                               min="0" max="5" step="0.1" required>
                    </div>
                    <div class="form-group">
                        <label for="telegram">Telegram Hours:</label>
                        <input type="number" id="telegram" name="telegram" 
                               min="0" max="5" step="0.1" required>
                    </div>
                    <div class="form-group">
                        <label for="twitter">Twitter Hours:</label>
                        <input type="number" id="twitter" name="twitter" 
                               min="0" max="5" step="0.1" required>
                    </div>
                    <div class="form-group">
                        <label for="facebook">Facebook Hours:</label>
                        <input type="number" id="facebook" name="facebook" 
                               min="0" max="5" step="0.1" required>
                    </div>
                </div>

                <div class="form-section">
                    <h2>👥 Social Interaction</h2>
                    <div class="form-group">
                        <label for="social_interactions">Daily Social Interactions:</label>
                        <input type="number" id="social_interactions" name="social_interactions" 
                               min="0" max="20" required>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" id="predictBtn" class="btn-primary">
                        🔮 Predict Performance
                    </button>
                    <button type="button" id="resetBtn" class="btn-secondary">
                        🔄 Reset Form
                    </button>
                </div>
            </form>

            <div id="resultSection" class="result-section hidden">
                <h2>📊 Prediction Result</h2>
                <div id="predictionResult" class="prediction-result">
                    <!-- Result will be displayed here -->
                </div>
                <div id="confidenceScore" class="confidence-score">
                    <!-- Confidence score will be displayed here -->
                </div>
            </div>

            <div id="loadingSection" class="loading-section hidden">
                <div class="spinner"></div>
                <p>Analyzing your data...</p>
            </div>

            <div id="errorSection" class="error-section hidden">
                <h3>❌ Error</h3>
                <p id="errorMessage"></p>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
